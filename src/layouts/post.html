<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} | TechBlog</title>
  <meta name="description" content="{{excerpt}}">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo"><span class="logo-icon">T</span>TechBlog</a>
      <nav class="header-nav">
        <a href="/">首页</a>
        {{category-nav}}
      </nav>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="菜单">☰</button>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">专栏</div>
      <ul class="sidebar-nav">{{category-nav}}</ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">最近文章</div>
      <ul class="sidebar-nav">{{recent-posts}}</ul>
    </div>
  </aside>

  <div class="layout">
    <main class="main">
      <nav class="article-toc" id="articleToc">
        <div class="article-toc-title">目录</div>
        <ul class="article-toc-list">{{toc}}</ul>
      </nav>

      <div class="post-layout">
        <article class="post-content">
          <div class="article-header">
            <h1 class="article-title">{{title}}</h1>
            <div class="article-meta">
              <span>{{date}}</span>
              <span><span class="category-badge">{{category}}</span></span>
            </div>
          </div>

          <details class="mobile-toc">
            <summary>目录</summary>
            <ul class="article-toc-list">{{toc}}</ul>
          </details>

          <div class="article-body">{{content}}</div>

          <div class="article-footer">
            <a href="/" class="back-link">← 返回首页</a>
          </div>
        </article>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>&copy; 2024 TechBlog. Powered by Markdown.</p>
  </footer>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        btn.textContent = '🌙';
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        btn.textContent = '☀️';
      }
    }
    const saved = localStorage.getItem('theme');
    document.getElementById('themeBtn').textContent = saved === 'light' ? '🌙' : '☀️';

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    }
  </script>
</body>
</html>
